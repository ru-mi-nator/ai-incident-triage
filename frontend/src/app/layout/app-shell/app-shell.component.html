<div class="shell">
  <mat-toolbar>
    <div class="brand">
      <span class="brand-icon"><mat-icon>bolt</mat-icon></span>
      <span>AI Incident Triage Portal</span>
    </div>

    <span class="toolbar-spacer"></span>

    @if (user(); as currentUser) {
      <div class="user-summary">
        <span class="avatar" aria-hidden="true">{{ currentUser.name.charAt(0) }}</span>
        <span class="user-copy">
          <strong>{{ currentUser.name }}</strong>
          <small>{{ role() }}</small>
        </span>
      </div>
    }

    <button mat-stroked-button type="button" (click)="logout()" aria-label="Log out">
      <mat-icon>logout</mat-icon>
      <span class="logout-label">Log out</span>
    </button>
  </mat-toolbar>

  <nav class="primary-nav" aria-label="Primary navigation">
    <a
      mat-button
      routerLink="/dashboard"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>dashboard</mat-icon>
      Dashboard
    </a>
    <a
      mat-button
      routerLink="/incidents"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>receipt_long</mat-icon>
      Incidents
    </a>
    @if (isSupportEngineer()) {
      <a
        mat-button
        routerLink="/incidents/new"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon>add_circle</mat-icon>
        Create Incident
      </a>
    }
  </nav>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>
