@if (user(); as currentUser) {
  <section aria-labelledby="welcome-heading">
    <p class="eyebrow">Dashboard</p>
    <h1 id="welcome-heading">Welcome, {{ currentUser.name }}</h1>
    <p class="intro">You are signed in as {{ role() }}.</p>

    <mat-card appearance="outlined">
      <div class="card-icon"><mat-icon>receipt_long</mat-icon></div>
      <div>
        <h2 mat-card-title>Incident workspace</h2>
        <mat-card-content>
          Review paginated incident summaries across applications and environments.
        </mat-card-content>
        <mat-card-actions>
          <a mat-flat-button routerLink="/incidents">View Incidents</a>
        </mat-card-actions>
      </div>
    </mat-card>
  </section>
}
