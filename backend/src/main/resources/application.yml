spring:
  application:
    name: incident-triage-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:incident_triage}
    username: ${POSTGRES_USER:incident_user}
    password: ${POSTGRES_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  ai:
    retry:
      max-attempts: 1
    openai:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
      api-key: ${GEMINI_API_KEY:not-configured}
      chat:
        completions-path: /chat/completions
        options:
          model: ${GEMINI_MODEL:gemini-2.5-flash-lite}
          temperature: 0.1

ai:
  enabled: ${AI_ENABLED:false}

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-incident-triage
    expiry-seconds: 3600
