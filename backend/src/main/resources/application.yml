spring:
  application:
    name: incident-triage-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:incident_triage}
    username: ${POSTGRES_USER:incident_user}
    password: ${POSTGRES_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true

  ai:
    retry:
      max-attempts: 1
    openai:
      api-key: ${OPENAI_API_KEY:not-configured}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4.1-mini}
          temperature: 0.1
          max-completion-tokens: 1200

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ai-incident-triage
    expiry-seconds: 3600
